name: Publish Plugins to npm

on:
  push:
    tags:
      - 'plugin-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Publish @nvq/claude-plugin-database
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$PKG_VERSION" ]; then
            echo "⏭ ${PKG_NAME}@${PKG_VERSION} already published, skipping"
          else
            npm publish --access public
          fi
        working-directory: packages/plugins/database
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nvq/claude-plugin-presentation
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$PKG_VERSION" ]; then
            echo "⏭ ${PKG_NAME}@${PKG_VERSION} already published, skipping"
          else
            npm publish --access public
          fi
        working-directory: packages/plugins/presentation
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nvq/claude-plugin-spreadsheet
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$PKG_VERSION" ]; then
            echo "⏭ ${PKG_NAME}@${PKG_VERSION} already published, skipping"
          else
            npm publish --access public
          fi
        working-directory: packages/plugins/spreadsheet
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

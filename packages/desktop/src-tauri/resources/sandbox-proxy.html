<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="color-scheme" content="light dark">
<title>MCP-UI Proxy</title>
<style>
  html, body {
    margin: 0;
    height: 100vh;
    width: 100vw;
    background-color: transparent;
  }
  body {
    display: flex;
    flex-direction: column;
  }
  * { box-sizing: border-box; }
  iframe {
    background-color: transparent;
    border: 0px none transparent;
    padding: 0px;
    overflow: hidden;
    flex-grow: 1;
    color-scheme: inherit;
  }
</style>
</head>
<body>
<script>
(function () {
  "use strict";

  // Based on the official ext-apps sandbox proxy reference implementation:
  // https://github.com/modelcontextprotocol/ext-apps/blob/main/examples/basic-host/src/sandbox.ts
  //
  // Adapted for Tauri: origin checks relaxed because Tauri uses asset:// protocol
  // which doesn't have a standard origin for postMessage validation.

  var RESOURCE_READY = "ui/notifications/sandbox-resource-ready";
  var PROXY_READY = "ui/notifications/sandbox-proxy-ready";

  // Create inner iframe upfront (same as official implementation)
  var inner = document.createElement("iframe");
  inner.style = "width:100%; height:100%; border:none;";
  inner.setAttribute("sandbox", "allow-scripts allow-same-origin allow-forms");
  document.body.appendChild(inner);

  // Bidirectional message relay:
  //   Host (parent window) <-> Sandbox (this frame) <-> View (inner iframe)
  window.addEventListener("message", function (event) {
    if (event.source === window.parent) {
      if (event.data && event.data.method === RESOURCE_READY) {
        var params = event.data.params || {};

        // Allow dynamic sandbox attribute override from host
        if (typeof params.sandbox === "string") {
          inner.setAttribute("sandbox", params.sandbox);
        }

        if (typeof params.html === "string") {
          // Use document.write (official approach — srcdoc breaks some apps like CesiumJS)
          var doc = inner.contentDocument || (inner.contentWindow && inner.contentWindow.document);
          if (doc) {
            doc.open();
            doc.write(params.html);
            doc.close();
          } else {
            // Fallback to srcdoc if document is not accessible
            console.warn("[Sandbox] document.write not available, falling back to srcdoc");
            inner.srcdoc = params.html;
          }
        }
      } else {
        // Forward all other parent messages to inner iframe
        if (inner && inner.contentWindow) {
          inner.contentWindow.postMessage(event.data, "*");
        }
      }
    } else if (event.source === inner.contentWindow) {
      // Relay messages from inner frame to parent window
      window.parent.postMessage(event.data, "*");
    }
  });

  // Notify Host that Sandbox is ready to receive view HTML
  window.parent.postMessage({
    jsonrpc: "2.0",
    method: PROXY_READY,
    params: {}
  }, "*");
})();
</script>
</body>
</html>

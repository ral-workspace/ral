<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ral</title>
    <style>
      body {
        margin: 0;
        background-color: #18181b;
      }
      #splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #18181b;
        transition: opacity 0.3s ease-out;
      }
      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #splash img {
        width: 24px;
        height: 24px;
        margin-bottom: 16px;
      }
      #splash .app-name {
        color: #a1a1aa;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 16px;
        font-weight: 500;
        letter-spacing: 0.05em;
        margin-bottom: 32px;
      }
      #splash .spinner {
        width: 20px;
        height: 20px;
        border: 2px solid #27272a;
        border-top-color: #71717a;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0,0,0,0);
        white-space: nowrap;
        border-width: 0;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <div id="splash">
      <img width="24" height="24" src="/logo.svg" alt="Ral" />
      <h1 class="sr-only">Ral</h1>
      <div class="app-name" aria-hidden="true">Ral</div>
      <div class="spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
